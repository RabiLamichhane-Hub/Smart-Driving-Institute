{% for vehicle in vehicles %}
<div class="form-check">
  <input type="checkbox" name="vehicles" value="{{ vehicle.pk }}" id="vehicle_{{ vehicle.pk }}" class="form-check-input">
  <label class="form-check-label" for="vehicle_{{ vehicle.pk }}">
    {{ vehicle.brand }} {{ vehicle.model }} ({{ vehicle.registration_number }})
  </label>
</div>
{% empty %}
<p>No vehicles available for this type.</p>
{% endfor %}
