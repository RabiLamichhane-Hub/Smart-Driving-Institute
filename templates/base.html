<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}SDIMS{% endblock %}</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            display: flex;
            background-color: #f5f6fa;
        }

        .sidebar {
            width: 220px;
            height: 100vh;
            background-color: #2c3e50;
            color: white;
            padding: 20px;
            position: fixed;
        }

        .content {
            margin-left: 240px;
            padding: 20px;
            width: 100%;
        }

        .menu a {
            color: white;
            text-decoration: none;
            display: block;
            padding: 8px;
            border-radius: 5px;
        }

        .menu a:hover {
            background-color: #34495e;
        }
    </style>
</head>

<body>

    {% include 'sidebar.html' %}

    <div class="content">
        {% block content %}
        {% endblock %}
    </div>

</body>
</html>
